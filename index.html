<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Leave Application System</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="back-home">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
                <h1><i class="fas fa-sign-in-alt"></i> Login</h1>
                <p>Enter your credentials to access the system</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your college email">
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <div class="auth-links">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>

                <div class="test-users">
                    <h4>Quick Login (Test Users):</h4>
                    <div class="test-user-buttons">
                        <button type="button" class="btn-test" onclick="quickLogin('student1@college.edu', 'student123')">
                            Student Login
                        </button>
                        <button type="button" class="btn-test" onclick="quickLogin('teacher@college.edu', 'teacher123')">
                            Teacher Login
                        </button>
                        <button type="button" class="btn-test" onclick="quickLogin('hod@college.edu', 'hod123')">
                            HOD Login
                        </button>
                    </div>
                </div>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        function quickLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    </script>
</body>
</html>
