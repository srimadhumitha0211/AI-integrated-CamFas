<!DOCTYPE html>
<html>
<head>
    <title>Login - Leave System</title>
   <link rel="stylesheet" href="login.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

     <header>
        <div class="container header-flex">

            <!-- LOGO + NAME -->
            <div class="logo-box">
                <img src="cse-bg-img/logo.jpeg">
                <div class="logo-text">
                    <h1>CAMFAS</h1>
                    <p>Simplifying Campus Life for Faculty and Students</p>
                </div>
            </div>

            

            <!-- NAV -->
            <nav class="nav-buttons">
                <a href="#" class="nav-btn">Login</a>
                <a href="#departments" class="nav-btn">Departments</a>
                <a href="mainAbout.html" class="nav-btn">About Us</a>
                <a href="#contact" class="nav-btn">Contact</a>
            </nav>

        </div>
    </header>


<div class="main-wrapper">

    <!-- LEFT SIDE: LOGIN FORM -->
    <div class="form-section">
        <h2>Login to Leave System</h2>

        <form action="/auth/login" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <div class="role-selector">
                <label>
                    <input type="radio" name="role" value="student" checked> Student
                </label>
                <label>
                    <input type="radio" name="role" value="teacher"> Teacher
                </label>
                <label>
                    <input type="radio" name="role" value="hod"> HOD
                </label>
            </div>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="/register">Register here</a></p>
    </div>

    <!-- RIGHT SIDE: IMAGE -->
    <div class="image-section">
        <img src="login-img.jpeg" alt="Login Illustration">
    </div>

</div>

</body>
</html>
