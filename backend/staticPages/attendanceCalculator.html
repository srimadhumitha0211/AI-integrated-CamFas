<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<title>Attendance Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Segoe UI', sans-serif;
     background: linear-gradient(135deg, #e6c7ff, #f3dcff, #ffd6ff);
  
}
.container{
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

/* HEADER */
/* HEADER */
    header {
        background: rgba(203, 103, 199, 0.674);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.25);
        padding: 14px 0;
         margin: 0%;
        width: 100%;
        
    }

    .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* LOGO */
    .logo-box {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .logo-box img {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        border: 2px solid #fff;
        background: #ca93e2;;
    }

    .logo-text h1 {
        font-size: 20px;
        color: #330e43;
         margin-top: 0;
        text-align: left;
        padding-bottom: 10px;
    }

    .logo-text p{
        font-size: 12px;
        /* color: #f1f1f1; */
        color: #330e43;
    }

    /* NAV */
    .nav-buttons {
        display: flex;
        gap: 18px;
    }

    .nav-btn {
        text-decoration: none;
        /* color: #fff; */
        color: #330e43;
        font-size: 14px;
        padding: 6px 14px;
        border-radius: 20px;
        transition: 0.3s;
    }

    .nav-btn:hover {
        background: rgba(255, 255, 255, 0.25);
    }



/* MAIN CONTAINER */


/* CARD */
.card {
   
    padding: 30px ;
   margin-top: 70px ;
   margin-left: 50px;
    
    display: flex;
    justify-content: space-between;
    gap: 10px;
     display: flex;
            width: 80%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
}

/* LEFT SIDE FORM */
.form-section {
    flex: 1;
}

.form-section h2 {
    color: #8e24aa;
    margin-bottom: 20px;
    text-align: center;
    font-size: 25px;

}

label {
    font-weight: 600;
    color: #6a1b9a;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
}

 button {
            width: 100%;
            background: linear-gradient(90deg, #8e24aa, #ba68c8);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(142, 36, 170, 0.3);
        }


.result {
    margin-top: 20px;
    font-weight: bold;
}

/* IMAGE SECTION */
.image-section {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
      padding: 20px;
    background: transparent;
}

.image-section img {
    width: 100%;
    max-width: 220px;
    border-radius: 15px;
     
}

/* RESPONSIVE */
@media(max-width: 768px) {
     .header-flex{ 
    flex-direction: column; 
    align-items: center; 
    text-align: center;
     gap: 10px;
   }
    .nav-buttons{ 
      flex-wrap: wrap; 
      justify-content: center;
       gap: 10px; 
      }

    .card {
        flex-direction: column;
        width: 90%;
         /* padding: 15px; */
    }
 .image-section {
                padding: 15px;
            }
    .image-section img {
        max-width: 100%;
       
         /* width: 60%; */
    }
}

</style>
</head>

<body>

 <header>
        <div class="container header-flex">

            <!-- LOGO + NAME -->
            <div class="logo-box">
                <img src="cse-bg-img/logo.jpeg">
                <div class="logo-text">
                    <h1>CAMFAS</h1>
                    <p>Simplifying Campus Life for Faculty and Students</p>
                </div>
            </div>

            

            <!-- NAV -->
            <nav class="nav-buttons">
                <a href="#" class="nav-btn">Login</a>
                <a href="#departments" class="nav-btn">Departments</a>
                <a href="mainAbout.html" class="nav-btn">About Us</a>
                <a href="#contact" class="nav-btn">Contact</a>
            </nav>

        </div>
    </header>


<div class="container">
    <div class="card">

        <div class="form-section">
            <h2>Attendance Calculator</h2>

            <label>Total Working Days</label>
            <input type="number" id="total" placeholder="Enter total days">

            <label>Number of Leaves Taken</label>
            <input type="number" id="leave" placeholder="Enter leave count">

            <button onclick="calculate()">Calculate</button>

            <div class="result" id="output"></div>
        </div>

        <div class="image-section">
            <!-- Replace with your campus image -->
            <img src="cse-bg-img/attandanceimg.jpeg" alt="Attendance Image">
        </div>

    </div>
</div>

<script>
function calculate() {

    let total = parseInt(document.getElementById("total").value);
    let leave = parseInt(document.getElementById("leave").value);

    if (!total || leave > total) {
        document.getElementById("output").innerHTML =
            "Please enter valid numbers!";
        return;
    }

    let attended = total - leave;
    let attendance = (attended / total) * 100;
    attendance = attendance.toFixed(2);

    let resultText = "Attendance: " + attendance + "%<br>";

    if (attendance >= 75) {
        resultText += "<span style='color:green;'>Eligible ✅</span>";
    } else {
        resultText += "<span style='color:red;'>Not Eligible ❌</span>";
    }

    document.getElementById("output").innerHTML = resultText;
}
</script>

</body>
</html>
