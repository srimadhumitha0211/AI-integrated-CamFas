/* Button Style */
.section-btn {
       display: block;
            align-items: center;
            gap: 10px;
            background: #f2c8ff;
            color: #000;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
}

/* Hover Effect */
.section-btn:hover {
    transform: translateY(-3px);
  
     background: #e5a7ff;
}

/* Click Effect */
.section-btn:active {
    transform: scale(0.97);
}
