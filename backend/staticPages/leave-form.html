<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Leave Form</title>
    <link rel="stylesheet" href="./style.css/style2.css">
     <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    
</head>
<body>

           
             <!--apply leave section-->
            <section id="apply-leave-section" class="dashboard-section">
                 
                    <div class="section-header" >
                       
                        <h2 ><i class="fas fa-file-upload"></i> Apply for Leave</h2>
                        
                    </div>
                    <h3>Fill the form below to apply for leave</h3>

                    <form id="leaveForm" class="leave-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="leaveType"><i class="fas fa-tag"></i> Leave Type</label>
                                <select id="leaveType" required>
                                    <option value="">Select leave type</option>
                                    <option value="medical">Personal Leave</option>
                                    <option value="personal">Medical Leave</option>
                                    
                                    <option value="other">OD</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="startDate"><i class="fas fa-calendar-alt"></i> Start Date</label>
                                <input type="date" id="startDate" required>
                           
                                <label for="endDate"><i class="fas fa-calendar-alt"></i> End Date</label>
                                <input type="date" id="endDate" required>
                            </div>
                        </div>
                        

                        <div class="form-group">
                            <label for="reason"><i class="fas fa-comment"></i> Reason for Leave</label>
                            <textarea id="reason" rows="1" required placeholder=" provide your reason  "></textarea>
                        </div>

                      

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i> Submit Application
                            </button>
                            <button type="button" class="btn btn-secondary" id="cancelLeaveBtn">
                                Cancel
                            </button>

                        </div>
                    </div>
                   
                    </form>
                
            </section>

            <div class="dashboard-content">
                <!-- Home Section -->
                <section id="home-section" class="dashboard-section active">
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="stat-info">
                                
                                <p>Pending Applications :</p>
                            </div>
                            
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon approved">
                                
                                <i class="fas fa-file-alt"></i>
                                
                            </div>
                            <div class="stat-info">
                            
                                <h3 id="approvedCount">0</h3>
                                <p>Approved Leaves :</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon rejected">
                                <i class="fas fa-check-circle"></i>
                                
                            </div>
                            <div class="stat-info">
                                <h3 id="rejectedCount">0</h3>
                                <p>Rejected Leaves :</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon total">
                                <i class="fas fa-times-circle"></i>
                                
                            </div>
                            <div class="stat-info">
                                <h3 id="totalCount">0</h3>
                                <p>Total Applications :</p>
                            </div>
                        </div>
                    </div>

                    
                </section>
            </div>
 </body>  
</html>
