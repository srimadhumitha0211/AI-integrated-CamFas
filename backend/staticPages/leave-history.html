<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Leave History</title>
    <link rel="stylesheet" href="./style.css/style2.css">
     <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
   
</head>
<body>

    <header>
        <div class="container header-flex">

            <!-- LOGO + NAME -->
            <div class="logo-box">
                <img src="cse-bg-img/logo.jpeg">
                <div class="logo-text">
                    <h1>CAMFAS</h1>
                    <p>Simplifying Campus Life for Faculty and Students</p>
                </div>
            </div>

            

            <!-- NAV -->
            <nav class="nav-buttons">
                <a href="#" class="nav-btn">Login</a>
                <a href="#departments" class="nav-btn">Departments</a>
                <a href="mainAbout.html" class="nav-btn">About Us</a>
                <a href="#contact" class="nav-btn">Contact</a>
            </nav>

        </div>
    </header>

                <!-- My Leaves Section -->
                <section id="my-leaves-section" class="dashboard-section">
                    <div class="section-header">
                        <h2><i class="fas fa-history"></i> My Leave History</h2>
                        <div class="filters">
                            <select id="statusFilter">
                                <option value="all">All Status</option>
                                <option value="pending">Pending</option>
                                <option value="teacher-approved">Teacher Approved</option>
                                <option value="hod-approved">HOD Approved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                            <button class="btn btn-secondary" id="refreshLeavesBtn">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="leavesTable">
                            <thead>
                                <tr>
                                    <p>Application ID :</p>
                                    <p>Applied On :</p>
                                    <p>Leave Dates :</p>
                                    <p>Type :</p>
                                    <p>Days :</p>
                                    <p>Status :</p>
                                    <p>Teacher Comment :</p>
                                    <p>HOD Comment :</p>
                                    
                                </tr>
                            </thead>
                            <tbody id="leavesTableBody">
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Profile Section -->
                
            <!-- Notification Modal -->
            <div id="notificationModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3><i class="fas fa-bell"></i> Notifications</h3>
                        <span class="close-modal">&times;</span>
                    </div>
                    <div class="modal-body">
                        <div id="notificationsList">
                            <!-- Notifications will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Leave Details Modal -->
            <div id="leaveDetailsModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3><i class="fas fa-file-alt"></i> Leave Application Details</h3>
                        <span class="close-modal">&times;</span>
                    </div>
                    <div class="modal-body">
                        <div id="leaveDetailsContent">
                            <!-- Leave details will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/student.js"></script>
</body>
</html>
